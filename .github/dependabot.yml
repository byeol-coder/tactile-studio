version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      build-and-test-tooling:
        patterns:
          - vite
          - vitest
          - "@vitejs/*"
          - "@vitest/*"
          - "@playwright/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
