name: Studio CI (React/TS library)

# Validates the NEW React + TypeScript layer under src/ (core, codecs,
# device, storage, react, ui) — completely separate from deploy.yml, which
# only ships the canonical vanilla app (index.html/support.js/vendor) to
# GitHub Pages and never touches this pipeline.
#
# Runs on every push and every PR so a regression in the migration's
# regression/parity suite (tests/regression, tests/parity) — including the
# fingerprint tests that catch any accidental edit to the vanilla app itself
# — is caught automatically, not just when someone remembers to run
# `npm test` locally.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict mode)
        run: npm run typecheck

      - name: x-dc syntax check (vanilla app integrity)
        run: npm run check:xdc-syntax

      - name: WCAG contrast gate (vanilla app integrity)
        run: npm run check:contrast

      - name: Unit + regression + parity tests
        run: npm test

      - name: Development-shell production build (Vite)
        run: npm run build:dev-shell

      - name: Library package build (ESM + .d.ts, all 5 entry points)
        run: npm run build:package

      - name: Verify vanilla app files are byte-for-byte untouched
        run: |
          if ! git diff --quiet HEAD -- index.html support.js vendor/ corpus.js corpus-search.js; then
            echo "::error::A CI step modified the vanilla app's tracked files. This pipeline must never do that."
            git diff --stat HEAD -- index.html support.js vendor/ corpus.js corpus-search.js
            exit 1
          fi
