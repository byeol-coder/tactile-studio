name: Studio CI (React/TS library)

permissions:
  contents: read

# Validates the NEW React + TypeScript layer under src/ (core, codecs,
# device, storage, react, ui) — completely separate from deploy.yml, which
# only ships the canonical vanilla app (index.html/support.js/vendor) to
# GitHub Pages and never touches this pipeline.
#
# Runs on every push and every PR so a regression in the migration's
# regression/parity suite (tests/regression, tests/parity) — including the
# fingerprint tests that catch any accidental edit to the vanilla app itself
# — is caught automatically, not just when someone remembers to run
# `npm test` locally.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: studio-ci-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict mode)
        run: npm run typecheck

      - name: x-dc syntax check (vanilla app integrity)
        run: npm run check:xdc-syntax

      - name: WCAG contrast gate (vanilla app integrity)
        run: npm run check:contrast

      - name: Unit + regression + parity tests with coverage gate
        run: npm run test:coverage

      - name: Dependency audit (high/critical)
        # Runtime package has no direct production dependencies. Vite/Vitest are
        # development-only and tracked by Dependabot; do not block releases on
        # a dev-server advisory that requires a breaking Vite major upgrade.
        run: npm audit --omit=dev --audit-level=high

      - name: Development-shell production build (Vite)
        run: npm run build:dev-shell

      - name: Library package build (ESM + .d.ts, all 5 entry points)
        run: npm run build:package

      - name: Packed-package consumer smoke test
        run: npm run check:package

      - name: Verify migration does not alter the vanilla app
        run: |
          git fetch origin main
          if ! git diff --quiet origin/main...HEAD -- index.html support.js vendor/ corpus.js corpus-search.js; then
            echo "::error::The migration branch changes protected vanilla-app files. Split those changes into a separately reviewed PR."
            git diff --stat origin/main...HEAD -- index.html support.js vendor/ corpus.js corpus-search.js
            exit 1
          fi

  browser-accessibility:
    name: Browser and accessibility smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
